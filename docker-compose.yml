services:
  # Backend API - Node.js + TypeScript REST API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "3001:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - WALLET_KEY=${WALLET_KEY:-change-this-wallet-key-in-production}
      - WALLET_ID=${WALLET_ID:-business-wallet}
      - DB_TYPE=postgres
      - DB_HOST=db:5432
      - DB_USER=businesswallet
      - DB_PASSWORD=${DB_PASSWORD:-changeme}
      - EMPLOYEE_VCT_URI=${EMPLOYEE_VCT_URI:-https://businesswallet.example.com/credentials/types/employee/v1}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - business-wallet-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # Web UI - React frontend
  web-ui:
    build:
      context: ./web-ui
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    environment:
      - NODE_ENV=production
    networks:
      - business-wallet-network
    restart: unless-stopped

  # PostgreSQL Database
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: businesswallet
      POSTGRES_USER: businesswallet
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - business-wallet-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U businesswallet"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  business-wallet-network:
    driver: bridge

volumes:
  postgres-data:
