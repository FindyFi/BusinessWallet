openapi: 3.0.3
info:
  title: Business Wallet API
  description: |
    REST API for the Business Wallet system. This API enables organizations to issue, store, 
    share, and request verifiable credentials and documents.
    
    ## Features
    - Issue digital credentials
    - Store credentials securely
    - Share credentials with third parties
    - Request credentials from others
    - Multi-tenant support
    
    ## Standards
    - W3C Verifiable Credentials Data Model 2.0
    - OpenID4VC (OID4VCI, OID4VP)
    - OAuth 2.0 with OpenID Connect
  version: 0.1.0
  contact:
    name: Business Wallet Team
  license:
    name: ISC

servers:
  - url: http://localhost:3000
    description: Development server
  - url: https://api.businesswallet.example.com
    description: Production server (example)

tags:
  - name: Health
    description: Service health and status endpoints
  - name: Credentials
    description: Credential management operations
  - name: Tenants
    description: Multi-tenant management (future)

paths:
  /health:
    get:
      summary: Health check
      description: Returns the health status of the API server
      operationId: getHealth
      tags:
        - Health
      responses:
        '200':
          description: Server is healthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
              example:
                status: ok
                timestamp: '2026-02-11T15:30:00.000Z'
                service: business-wallet-api
                version: 0.1.0

  /credentials/employee:
    post:
      summary: Issue employee credential
      description: |
        Issues an SD-JWT VC employee credential for the specified employee. The credential
        contains the employee's name, job title, and position dates. All claims support
        selective disclosure.

        VC Type Metadata for this credential type is available at
        `/.well-known/vct/employee`.
      operationId: issueEmployeeCredential
      tags:
        - Credentials
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EmployeeCredentialRequest'
            example:
              firstName: Jane
              lastName: Doe
              jobTitle: Software Engineer
              startDate: '2024-01-15'
      responses:
        '201':
          description: Employee credential issued successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmployeeCredentialResponse'
        '400':
          description: Invalid request — missing required fields or invalid date format
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Insufficient permissions to issue credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /credentials/employee/verify:
    post:
      summary: Verify employee credential
      description: |
        Verifies the cryptographic signature and selective disclosures of an SD-JWT VC
        employee credential. The presenter may include any subset of the disclosures from
        the originally issued credential to achieve selective disclosure (FR-0008).

        Returns the verified claims that were selectively disclosed in the presented
        SD-JWT.
      operationId: verifyEmployeeCredential
      tags:
        - Credentials
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EmployeeCredentialVerifyRequest'
            example:
              credential: 'eyJ...~eyJ...~eyJ...~'
      responses:
        '200':
          description: Credential verified successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmployeeCredentialVerifyResponse'
        '400':
          description: Invalid credential — bad signature, unknown disclosure hash, or missing field
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /.well-known/jwks.json:
    get:
      summary: Issuer JSON Web Key Set
      description: |
        Returns the issuer's public key(s) as a JSON Web Key Set (JWKS). External
        verifiers can use this endpoint to obtain the public key needed to verify
        employee credential signatures (TR-0007).
      operationId: getIssuerJwks
      tags:
        - Credentials
      responses:
        '200':
          description: JWKS document
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JwksResponse'

  /.well-known/vct/employee:
    get:
      summary: Employee credential VC Type Metadata
      description: |
        Returns the SD-JWT VC Type Metadata document for the employee credential type,
        as specified in draft-ietf-oauth-sd-jwt-vc. This document describes the credential
        structure, display properties, and claim definitions.
      operationId: getEmployeeVcTypeMetadata
      tags:
        - Credentials
      responses:
        '200':
          description: VC Type Metadata document
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VcTypeMetadata'

components:
  schemas:
    HealthResponse:
      type: object
      required:
        - status
        - timestamp
        - service
        - version
      properties:
        status:
          type: string
          enum: [ok, degraded, error]
          description: Overall health status of the service
          example: ok
        timestamp:
          type: string
          format: date-time
          description: Current server timestamp in ISO 8601 format
          example: '2026-02-11T15:30:00.000Z'
        service:
          type: string
          description: Name of the service
          example: business-wallet-api
        version:
          type: string
          description: API version
          example: 0.1.0

    EmployeeCredentialRequest:
      type: object
      required:
        - firstName
        - lastName
        - jobTitle
        - startDate
      properties:
        firstName:
          type: string
          description: The employee's given (first) name
          example: Jane
        lastName:
          type: string
          description: The employee's family (last) name
          example: Doe
        jobTitle:
          type: string
          description: The employee's job title or position within the organization
          example: Software Engineer
        startDate:
          type: string
          format: date
          description: The date when the employee started in their current position (ISO 8601 YYYY-MM-DD)
          example: '2024-01-15'
        endDate:
          type: string
          format: date
          description: The date when the position ended (ISO 8601 YYYY-MM-DD). Omit if the employee is still in the position.
          example: '2025-12-31'

    EmployeeCredentialResponse:
      type: object
      required:
        - credential
        - format
      properties:
        credential:
          type: string
          description: The issued SD-JWT VC credential in compact serialization format
          example: 'eyJ...~eyJ...~'
        format:
          type: string
          enum: [vc+sd-jwt]
          description: The credential format
          example: 'vc+sd-jwt'

    VcTypeMetadata:
      type: object
      required:
        - vct
        - name
      description: SD-JWT VC Type Metadata document as specified in draft-ietf-oauth-sd-jwt-vc
      properties:
        vct:
          type: string
          description: URI uniquely identifying this credential type
          example: 'https://businesswallet.example.com/credentials/types/employee/v1'
        name:
          type: string
          description: Human-readable name for this credential type
          example: 'Employee Credential'
        description:
          type: string
          description: Human-readable description of this credential type
          example: 'A verifiable credential confirming a person''s employment status and role within an organization.'
        display:
          type: array
          description: Localized display information for this credential type
          items:
            type: object
            required:
              - lang
              - name
            properties:
              lang:
                type: string
                description: BCP 47 language tag
                example: en
              name:
                type: string
                description: Localized credential type name
                example: 'Employee Credential'
              description:
                type: string
                description: Localized credential type description
        claims:
          type: array
          description: Definitions for each claim in this credential type
          items:
            type: object
            required:
              - path
            properties:
              path:
                type: array
                items:
                  type: string
                description: JSON path to the claim value
                example: ['firstName']
              sd:
                type: string
                enum: [always, allowed, never]
                description: Whether the claim may be selectively disclosed
                example: allowed
              display:
                type: array
                items:
                  type: object
                  required:
                    - lang
                    - label
                  properties:
                    lang:
                      type: string
                      description: BCP 47 language tag
                      example: en
                    label:
                      type: string
                      description: Localized display label for the claim
                      example: First Name

    EmployeeCredentialVerifyRequest:
      type: object
      required:
        - credential
      properties:
        credential:
          type: string
          description: The SD-JWT VC credential in compact serialisation format to verify
          example: 'eyJ...~eyJ...~eyJ...~'

    EmployeeCredentialVerifyResponse:
      type: object
      required:
        - valid
        - vct
        - iss
        - iat
        - disclosedClaims
      properties:
        valid:
          type: boolean
          description: Whether the credential signature and disclosures are valid
          example: true
        vct:
          type: string
          description: The credential type URI from the verified credential
          example: 'https://businesswallet.example.com/credentials/types/employee/v1'
        iss:
          type: string
          description: The issuer identifier from the verified credential
          example: 'https://businesswallet.example.com'
        iat:
          type: integer
          description: The issuance time as a Unix epoch timestamp
          example: 1705286400
        disclosedClaims:
          type: object
          description: |
            Claims that were selectively disclosed in the presented SD-JWT.
            Only the disclosures included by the presenter are returned.
          additionalProperties:
            type: string
          example:
            firstName: Jane
            jobTitle: Software Engineer

    JwksResponse:
      type: object
      required:
        - keys
      description: JSON Web Key Set document (RFC 7517)
      properties:
        keys:
          type: array
          description: Array of JSON Web Keys
          items:
            type: object
            required:
              - kty
            properties:
              kty:
                type: string
                description: Key type
                example: EC
              use:
                type: string
                description: Intended key use
                example: sig
              alg:
                type: string
                description: Algorithm
                example: ES256
              crv:
                type: string
                description: EC curve name
                example: P-256
              x:
                type: string
                description: EC public key x coordinate (base64url)
              y:
                type: string
                description: EC public key y coordinate (base64url)

    ErrorResponse:
      type: object
      required:
        - error
        - message
      properties:
        error:
          type: string
          description: Machine-readable error code
          example: VALIDATION_ERROR
        message:
          type: string
          description: Human-readable error description
          example: 'Missing required field: startDate'

  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: OAuth 2.0 JWT token authentication (to be implemented)

security: []
